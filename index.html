<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 global tax game</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics.js";
    import { getDatabase, ref, set, get, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
    import { getAuth, TwitterAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    // === あなたのFirebase config（そのまま使用）===
    const firebaseConfig = {
      apiKey: "AIzaSyCwhHspaG94goiCIjVj3h-Un5pBK3JTjMU",
      authDomain: "soulkin-aa3b7.firebaseapp.com",
      databaseURL: "https://soulkin-aa3b7-default-rtdb.firebaseio.com",
      projectId: "soulkin-aa3b7",
      storageBucket: "soulkin-aa3b7.firebasestorage.app",
      messagingSenderId: "358331064206",
      appId: "1:358331064206:web:d7760ea0919259418a4edf",
      measurementId: "G-S5Z8TTWYE2"
    };

    // Firebase初期化
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new TwitterAuthProvider();

    console.log("✅ global tax game - Firebase初期化完了");

    // ======================
    // デフォルト5銘柄を「すでに上場しているもの」として記録
    // （初回のみ実行。以降は自動でスキップ）
    // ======================
    async function initDefaultStocks() {
      const stocksRef = ref(db, 'stocks');
      const snapshot = await get(stocksRef);

      if (!snapshot.exists()) {
        const defaultStocks = {
          stock1: {
            id: "stock1",
            name: "GlobalTech",
            price: 1200,
            lastUpdated: Date.now(),
            owner: null,
            ownerX: null
          },
          stock2: {
            id: "stock2",
            name: "EcoEnergy",
            price: 850,
            lastUpdated: Date.now(),
            owner: null,
            ownerX: null
          },
          stock3: {
            id: "stock3",
            name: "FinanceKing",
            price: 2100,
            lastUpdated: Date.now(),
            owner: null,
            ownerX: null
          },
          stock4: {
            id: "stock4",
            name: "SpaceXplore",
            price: 650,
            lastUpdated: Date.now(),
            owner: null,
            ownerX: null
          },
          stock5: {
            id: "stock5",
            name: "MediaMogul",
            price: 1450,
            lastUpdated: Date.now(),
            owner: null,
            ownerX: null
          }
        };

        await set(stocksRef, defaultStocks);
        console.log("✅ デフォルト5銘柄を『すでに上場済み』としてRealtime Databaseに記録しました");
      } else {
        console.log("✅ デフォルト銘柄はすでに存在しています");
      }
    }

    // ======================
    // 1分ごとに株価を自動変動（全プレイヤー共通）
    // ======================
    async function fluctuatePrices() {
      const stocksRef = ref(db, 'stocks');
      const snapshot = await get(stocksRef);
      const stocks = snapshot.val();

      if (!stocks) return;

      const updates = {};
      Object.keys(stocks).forEach(key => {
        const stock = stocks[key];
        // ±5% のランダム変動（より自然な動き）
        const changeRate = (Math.random() * 0.10) - 0.05;
        const newPrice = Math.max(100, Math.round(stock.price * (1 + changeRate))); // 最低100円

        updates[`stocks/${key}/price`] = newPrice;
        updates[`stocks/${key}/lastUpdated`] = Date.now();
      });

      await update(ref(db), updates);
      console.log("📈 1分ごとの株価変動を実行しました");
    }

    // ======================
    // 株一覧をリアルタイムで表示
    // ======================
    function renderStockList(stocks) {
      const container = document.getElementById('stockList');
      if (!stocks) {
        container.innerHTML = "<p>現在上場している銘柄はありません</p>";
        return;
      }

      let html = `
        <h2>📊 上場銘柄一覧（リアルタイム）</h2>
        <table border="1" style="width:100%; border-collapse:collapse; text-align:center;">
          <thead>
            <tr style="background:#222; color:#fff;">
              <th>銘柄名</th>
              <th>現在価格</th>
              <th>所有者（X）</th>
              <th>最終更新</th>
            </tr>
          </thead>
          <tbody>
      `;

      Object.keys(stocks).forEach(key => {
        const s = stocks[key];
        const time = new Date(s.lastUpdated).toLocaleTimeString('ja-JP');
        const ownerText = s.ownerX ? `@${s.ownerX}` : '---';
        html += `
          <tr>
            <td>${s.name}</td>
            <td><strong>¥${s.price.toLocaleString()}</strong></td>
            <td>${ownerText}</td>
            <td>${time}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // ======================
    // Xログイン（Twitter Auth）
    // ======================
    async function loginWithX() {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const screenName = user.providerData[0].screenName;

        document.getElementById('status').innerHTML = `
          ✅ Xログイン成功！<br>
          <strong>@${screenName}</strong> さん<br>
          <button onclick="listMyStock()" style="margin-top:10px; padding:10px 20px; font-size:16px;">自分の会社を上場する</button>
        `;
        console.log("X連携完了", user);
      } catch (error) {
        console.error("ログイン失敗", error);
        document.getElementById('status').innerHTML = `❌ ログイン失敗: ${error.message}`;
      }
    }

    // ======================
    // 自分の株を上場
    // ======================
    window.listMyStock = async function() {
      const user = auth.currentUser;
      if (!user) {
        alert("先にXログインしてください");
        return;
      }

      const stockName = prompt("上場する会社の名前を入力してください", `${user.providerData[0].screenName} Inc.`);
      if (!stockName) return;

      const newStockRef = push(ref(db, 'stocks'));
      await set(newStockRef, {
        id: newStockRef.key,
        name: stockName,
        price: 1000,
        lastUpdated: Date.now(),
        owner: user.uid,
        ownerX: user.providerData[0].screenName
      });

      alert(`🎉 「${stockName}」が上場しました！`);
    };

    // ======================
    // メイン処理
    // ======================
    window.onload = () => {
      // デフォルト銘柄を「すでに上場済み」として記録
      initDefaultStocks();

      // 1分ごとの株価変動（全クライアント共通）
      setInterval(fluctuatePrices, 60000);

      // 株価のリアルタイム監視
      const stocksRef = ref(db, 'stocks');
      onValue(stocksRef, (snapshot) => {
        const stocks = snapshot.val();
        renderStockList(stocks);
      });

      // Xログインボタン
      document.getElementById('loginBtn').addEventListener('click', loginWithX);

      console.log("🚀 global tax game 起動完了！");
    };
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #0f172a; color: #e2e8f0; }
    h1 { text-align: center; font-size: 2.5rem; }
    button { padding: 12px 24px; font-size: 18px; background: #1da1f2; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0c8ad8; }
    #status { margin: 20px 0; padding: 15px; background: #1e2937; border-radius: 8px; }
    table { margin-top: 20px; }
    th, td { padding: 12px; border: 1px solid #334155; }
  </style>
</head>
<body>
  <h1>🌍 global tax game</h1>
  <p style="text-align:center; font-size:1.2rem;">リアルタイム投資ゲーム<br>1分ごとに株価変動・X連携で誰でも上場可能</p>

  <div style="text-align:center; margin:30px 0;">
    <button id="loginBtn">Xでログインして株式上場する</button>
  </div>

  <div id="status" style="text-align:center; min-height:60px;"></div>

  <div id="stockList" style="margin-top:30px;">
    <!-- リアルタイムで株一覧がここに表示されます -->
  </div>

  <p style="text-align:center; font-size:0.9rem; margin-top:50px; color:#64748b;">
    ※ Firebase Realtime Database を使用しています。<br>
    初回アクセスでデフォルト5銘柄が自動記録されます。
  </p>
</body>
</html>
