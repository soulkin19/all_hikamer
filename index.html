<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Force: Hawk Ops - Tide Prison 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; touch-action: none; font-family: 'Courier New', monospace; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); border: 1px solid rgba(0,255,255,0.5); border-radius: 50%; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; width: 34px; height: 1px; background: rgba(0,255,255,0.3); }
        #info { position: absolute; bottom: 40px; right: 40px; color: #00ffff; text-align: right; font-size: 14px; background: rgba(0,0,0,0.6); padding: 10px; border-right: 4px solid #f00; }
        
        /* 操作用ジョイスティック */
        #joy-container { position: absolute; bottom: 80px; left: 80px; width: 160px; height: 160px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; }
        #joy-knob { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; top: 50px; left: 50px; transition: transform 0.05s linear; }
    </style>
</head>
<body>

<div id="hud">
    <div id="crosshair"></div>
    <div id="info">
        <div>SECTOR: ZERO-G BLOCK</div>
        <div id="coords">POS: 0.00, 0.00</div>
        <div style="color: #ffff00;">OBJECTIVE: EXTRACT FROM ROOFTOP</div>
    </div>
</div>

<div id="joy-container"><div id="joy-knob"></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- グローバル変数 ---
    let scene, camera, renderer, clock;
    let moveX = 0, moveZ = 0;
    let yaw = 0, pitch = 0;
    let touchLookId = null;
    let lastTouchX = 0, lastTouchY = 0;
    const player = { pos: new THREE.Vector3(0, 1.7, 40), speed: 0.18, radius: 1.0 };
    const colliders = [];

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.012);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        clock = new THREE.Clock();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const amb = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(amb);

        // タイドプリズン特有の赤い警報灯と青い作業灯
        const addLight = (x, y, z, color) => {
            const p = new THREE.PointLight(color, 80, 50);
            p.position.set(x, y, z);
            scene.add(p);
            // 光源オブジェクト
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 1), new THREE.MeshBasicMaterial({color: color}));
            box.position.set(x, y + 0.5, z);
            scene.add(box);
        };

        // --- マップ構築 (Tide Prison Style) ---
        const materialConcrete = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.3 });
        const materialMetal = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.9 });
        const materialStripe = new THREE.MeshStandardMaterial({ color: 0x333300, roughness: 0.5 }); // 黄色帯風

        // 1. 床
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), materialConcrete);
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 2. 中央ハブ (巨大な円柱構造)
        const hubGeo = new THREE.CylinderGeometry(20, 20, 60, 16, 1, true);
        const hub = new THREE.Mesh(hubGeo, materialConcrete);
        hub.position.y = 30;
        scene.add(hub);

        // 3. 多層キャットウォーク (円形の通路)
        const ringGeo = new THREE.TorusGeometry(35, 2, 8, 24);
        const ring = new THREE.Mesh(ringGeo, materialMetal);
        ring.rotation.x = Math.PI/2;
        ring.position.y = 10;
        scene.add(ring);

        // 4. 放射状の独房ブロック
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle) * 60;
            const z = Math.sin(angle) * 60;
            
            // 通路の壁
            const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 40), materialConcrete);
            wall.position.set(x, 10, z);
            wall.lookAt(0, 10, 0);
            scene.add(wall);
            colliders.push(new THREE.Box3().setFromObject(wall));

            // 通路入口のライト
            addLight(x * 0.6, 8, z * 0.6, i % 2 === 0 ? 0x00ffff : 0xff0000);
        }

        // 5. 外周の巨大な壁
        const outerWall = new THREE.Mesh(new THREE.CylinderGeometry(150, 150, 100, 32, 1, true), materialConcrete);
        outerWall.scale.set(-1, 1, 1); // 内側を向く
        outerWall.position.y = 50;
        scene.add(outerWall);

        setupControls();
        animate();
    }

    function setupControls() {
        const knob = document.getElementById('joy-knob');
        const container = document.getElementById('joy-container');
        const limit = 50;

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    // 左半分: スティック操作（視覚的フィードバックのみ更新）
                } else {
                    // 右半分: 視点移動開始
                    if (touchLookId === null) {
                        touchLookId = t.identifier;
                        lastTouchX = t.clientX;
                        lastTouchY = t.clientY;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                // 左手: 移動計算
                if (t.clientX < window.innerWidth / 2) {
                    const rect = container.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const dx = t.clientX - centerX;
                    const dy = t.clientY - centerY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const angle = Math.atan2(dy, dx);
                    const moveDist = Math.min(dist, limit);

                    knob.style.transform = `translate(${Math.cos(angle)*moveDist}px, ${Math.sin(angle)*moveDist}px)`;
                    
                    // 方向入力 (スティックの向きそのもの)
                    moveX = Math.cos(angle) * (moveDist / limit);
                    moveZ = Math.sin(angle) * (moveDist / limit);
                } 
                // 右手: 視点移動
                else if (t.identifier === touchLookId) {
                    const dx = t.clientX - lastTouchX;
                    const dy = t.clientY - lastTouchY;
                    yaw -= dx * 0.006;
                    pitch -= dy * 0.006;
                    pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    moveX = 0; moveZ = 0;
                    knob.style.transform = 'translate(0,0)';
                } else if (t.identifier === touchLookId) {
                    touchLookId = null;
                }
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // 1. カメラ回転の適用
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

        // 2. カメラの向きに基づいた移動ベクトルの計算
        if (moveX !== 0 || moveZ !== 0) {
            // カメラの向きから「前方」と「右方」を取得 (Y軸は無視)
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();
            
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();

            // moveZはスティックの上下方向(Forward/Backward)、moveXは左右方向(Strafe)
            // スティックのdyがマイナスなら前方へ進む
            const velocity = new THREE.Vector3()
                .addScaledVector(forward, -moveZ * player.speed)
                .addScaledVector(right, moveX * player.speed);

            const nextPos = player.pos.clone().add(velocity);

            // 簡易衝突判定
            let collision = false;
            const playerSphere = new THREE.Sphere(nextPos, player.radius);
            for (let box of colliders) {
                if (box.intersectsSphere(playerSphere)) {
                    collision = true;
                    break;
                }
            }

            if (!collision) {
                player.pos.copy(nextPos);
            }
        }

        camera.position.copy(player.pos);
        
        // UI更新
        document.getElementById('coords').innerText = 
            `POS: ${player.pos.x.toFixed(2)}, ${player.pos.z.toFixed(2)}`;

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
