<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tide Prison: Tactical FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; touch-action: none; font-family: 'Arial', sans-serif; }
        
        /* HUD */
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(0,255,0,0.8); border-radius: 50%; }
        #info { position: absolute; top: 40px; left: 40px; color: #111; background: rgba(255,255,255,0.8); padding: 10px; border-left: 5px solid #ffaa00; font-weight: bold; }

        /* 左ジョイスティック */
        #joy-base { position: absolute; bottom: 80px; left: 80px; width: 160px; height: 160px; background: rgba(0,0,0,0.1); border: 2px solid rgba(0,0,0,0.2); border-radius: 50%; }
        #joy-knob { position: absolute; width: 60px; height: 60px; background: rgba(0,0,0,0.3); border-radius: 50%; top: 50px; left: 50px; }
    </style>
</head>
<body>

<div id="hud">
    <div id="crosshair"></div>
    <div id="info">AREA: TIDE PRISON - HUB<br>OBJECTIVE: REACH EXTRACTION</div>
</div>
<div id="joy-base"><div id="joy-knob"></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock;
    let yaw = 0, pitch = 0;
    let moveData = { x: 0, y: 0 };
    let lookId = null, lastX = 0, lastY = 0;
    const player = { pos: new THREE.Vector3(0, 1.8, 20), speed: 0.2 };

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeeff); // 明るい空・天井

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        clock = new THREE.Clock();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 強力なライティング (タイドプリズンの明るい屋内を再現) ---
        const amb = new THREE.AmbientLight(0xffffff, 1.0); // 全体を明るく
        scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // --- マップ構築 (Tide Prison Brutalist/Industrial) ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 }); // 白いコンクリート
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.2, metalness: 0.5 }); // 金属床
        const hazardMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 }); // 黄色い警告帯

        // 床
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 中央のハブエリア (巨大な吹き抜け空間を壁で構成)
        const createWall = (x, y, z, w, h, d, mat = wallMat) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
        };

        // 周囲の巨大な壁
        createWall(0, 20, -50, 100, 40, 2); // 正面
        createWall(0, 20, 50, 100, 40, 2);  // 背後
        createWall(-50, 20, 0, 2, 40, 100); // 左
        createWall(50, 20, 0, 2, 40, 100);  // 右

        // 2階キャットウォーク
        createWall(0, 10, 0, 100, 0.5, 10, floorMat);
        createWall(0, 11, 5, 100, 2, 0.2, wallMat); // 手すり

        // 黄色いハザードライン (床に配置)
        createWall(0, 0.05, 15, 100, 0.1, 1, hazardMat);
        createWall(0, 0.05, -15, 100, 0.1, 1, hazardMat);

        // 戦術的遮蔽物 (コンテナ)
        const crateMat = new THREE.MeshStandardMaterial({ color: 0x224466, metalness: 0.8 });
        createWall(5, 1.5, 5, 3, 3, 6, crateMat);
        createWall(-10, 1.5, -5, 4, 3, 4, crateMat);

        setupControls();
        animate();
    }

    function setupControls() {
        const knob = document.getElementById('joy-knob');
        const container = document.getElementById('joy-base');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    // 左手: スティック操作（位置固定）
                } else {
                    // 右手: 視点移動開始
                    if (lookId === null) {
                        lookId = t.identifier;
                        lastX = t.clientX;
                        lastY = t.clientY;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                if (t.clientX < window.innerWidth / 2) {
                    // スティック移動
                    const rect = container.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const dx = t.clientX - centerX;
                    const dy = t.clientY - centerY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                    const angle = Math.atan2(dy, dx);
                    
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    moveData = { x: Math.cos(angle) * (dist / 50), y: Math.sin(angle) * (dist / 50) };
                } 
                else if (t.identifier === lookId) {
                    // 右手視点移動
                    const dx = t.clientX - lastX;
                    const dy = t.clientY - lastY;
                    yaw -= dx * 0.005;
                    pitch -= dy * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    lastX = t.clientX;
                    lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    moveData = { x: 0, y: 0 };
                    knob.style.transform = 'translate(0,0)';
                } else if (t.identifier === lookId) {
                    lookId = null;
                }
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        // 視点更新
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

        // 移動計算 (カメラのYaw回転に基づき、水平方向に移動)
        if (moveData.x !== 0 || moveData.y !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            
            // moveData.yはスティックの上下、moveData.xは左右
            player.pos.addScaledVector(forward, -moveData.y * player.speed);
            player.pos.addScaledVector(right, moveData.x * player.speed);
        }

        camera.position.copy(player.pos);
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
