<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D PvE - Day & Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; background: #87ceeb; }
        canvas { display: block; }

        /* UI全体 */
        #ui { position: absolute; top: 10px; left: 10px; color: #333; pointer-events: none; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid rgba(0,0,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ammo-display { position: absolute; bottom: 100px; right: 20px; color: white; text-align: right; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; pointer-events: none; }
        
        /* メッセージ */
        #reload-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffcc00; font-size: 24px; font-weight: bold; display: none; text-shadow: 2px 2px 0 #000; }
        #wave-notify { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); color: #d32f2f; font-size: 40px; font-weight: bold; display: none; text-shadow: 2px 2px 0 #fff; }

        /* --- モバイル用コントロール --- */
        .mobile-btn { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; }
        #fire-btn { bottom: 100px; right: 110px; width: 90px; height: 90px; background: rgba(255,0,0,0.4); }
        #ads-btn { bottom: 210px; right: 30px; }
        #reload-btn { bottom: 110px; right: 20px; }
        #switch-btn { bottom: 20px; right: 20px; width: 120px; border-radius: 10px; height: 50px; }
        
        /* ジョイスティック */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.6; }

        @media (min-width: 1024px) { .mobile-btn, #joystick-zone { display: none; } }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>WAVE: <span id="wave">1</span></div>
        <div>HEALTH: <span id="health">100</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="reload-msg">RELOADING...</div>
    <div id="wave-notify">NEW WAVE</div>
    <div id="ammo-display">
        <div id="weapon-name">XM7</div>
        <div style="font-size: 28px;"><span id="current-ammo">45</span> / <span id="max-ammo">45</span></div>
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="fire-btn" class="mobile-btn">FIRE</div>
    <div id="ads-btn" class="mobile-btn">ADS</div>
    <div id="reload-btn" class="mobile-btn">RELOAD</div>
    <div id="switch-btn" class="mobile-btn">SWITCH</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ゲーム設定 ---
        const WEAPONS = {
            S12K: { name: 'S12K', maxAmmo: 4, rpm: 120, reloadTime: 2000, recoil: 0.12, damage: 30, spread: 0.12, pellets: 8 },
            XM7: { name: 'XM7', maxAmmo: 45, rpm: 750, reloadTime: 2500, recoil: 0.03, damage: 35, spread: 0.02, pellets: 1 }
        };

        let currentWpnKey = 'XM7';
        let currentWeapon = WEAPONS.XM7;
        let ammo = currentWeapon.maxAmmo;
        let isReloading = false;
        let isAds = false;
        let score = 0;
        let wave = 1;
        let playerHealth = 100;
        let lastFireTime = 0;

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 昼の空
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 明るい照明
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // 地面 (グリッド付き)
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x7cfc00 }); // 草原
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(200, 40, 0x000000, 0x555555));

        // 武器
        const weaponGroup = new THREE.Group();
        const weaponMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.12, 0.12, 0.6),
            new THREE.MeshPhongMaterial({ color: 0x222222 })
        );
        weaponMesh.position.set(0.3, -0.25, -0.5);
        weaponGroup.add(weaponMesh);
        scene.add(weaponGroup);

        // 敵
        const enemies = [];
        const enemyGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });

        function spawnWave() {
            const count = 2 + wave * 2;
            for (let i = 0; i < count; i++) {
                const enemy = new THREE.Mesh(enemyGeo, enemyMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 10;
                enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
                enemy.userData = { health: 100, lastAttack: 0 };
                scene.add(enemy);
                enemies.push(enemy);
            }
            const el = document.getElementById('wave-notify');
            el.innerText = `WAVE ${wave}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1500);
        }

        // --- アクション ---
        function fire() {
            if (isReloading || ammo <= 0 || playerHealth <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;

            ammo--;
            lastFireTime = now;
            updateUI();

            // 反動
            camera.rotation.x += currentWeapon.recoil;
            weaponGroup.position.z += 0.1;

            const raycaster = new THREE.Raycaster();
            for (let i = 0; i < currentWeapon.pellets; i++) {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                raycaster.ray.direction.x += (Math.random() - 0.5) * currentWeapon.spread;
                raycaster.ray.direction.y += (Math.random() - 0.5) * currentWeapon.spread;

                const hits = raycaster.intersectObjects(enemies);
                if (hits.length > 0) {
                    const target = hits[0].object;
                    target.userData.health -= currentWeapon.damage;
                    if (target.userData.health <= 0) {
                        scene.remove(target);
                        enemies.splice(enemies.indexOf(target), 1);
                        score += 100;
                        updateUI();
                    }
                }
            }
            if (ammo === 0) reload();
        }

        function reload() {
            if (isReloading || ammo === currentWeapon.maxAmmo) return;
            isReloading = true;
            document.getElementById('reload-msg').style.display = 'block';
            weaponGroup.position.y = -1; // 武器を下げる

            setTimeout(() => {
                ammo = currentWeapon.maxAmmo;
                isReloading = false;
                document.getElementById('reload-msg').style.display = 'none';
                weaponGroup.position.y = 0;
                updateUI();
            }, currentWeapon.reloadTime);
        }

        function switchWeapon() {
            currentWpnKey = currentWpnKey === 'XM7' ? 'S12K' : 'XM7';
            currentWeapon = WEAPONS[currentWpnKey];
            ammo = currentWeapon.maxAmmo;
            isReloading = false;
            document.getElementById('reload-msg').style.display = 'none';
            weaponGroup.position.y = 0;
            updateUI();
        }

        function setAds(active) {
            isAds = active;
            camera.fov = active ? 40 : 75;
            camera.updateProjectionMatrix();
            weaponGroup.position.x = active ? -0.3 : 0;
        }

        function updateUI() {
            document.getElementById('current-ammo').innerText = ammo;
            document.getElementById('max-ammo').innerText = currentWeapon.maxAmmo;
            document.getElementById('weapon-name').innerText = currentWeapon.name;
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            document.getElementById('health').innerText = Math.max(0, playerHealth);
        }

        // --- モバイル入力処理 ---
        let moveData = { x: 0, y: 0 };
        const joyStick = document.getElementById('joystick-stick');
        const joyZone = document.getElementById('joystick-zone');

        joyZone.addEventListener('touchstart', (e) => handleJoy(e), {passive: false});
        joyZone.addEventListener('touchmove', (e) => handleJoy(e), {passive: false});
        joyZone.addEventListener('touchend', () => {
            moveData = { x: 0, y: 0 };
            joyStick.style.transform = `translate(0px, 0px)`;
        });

        function handleJoy(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            moveData.x = (Math.cos(angle) * dist) / 50;
            moveData.y = (Math.sin(angle) * dist) / 50;
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        }

        // 右画面タッチでの視点移動
        let lastTouch = null;
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'DIV') lastTouch = e.touches[0];
        });
        window.addEventListener('touchmove', (e) => {
            if (lastTouch && e.touches[0].clientX > window.innerWidth / 2) {
                const t = e.touches[0];
                const dx = t.clientX - lastTouch.clientX;
                const dy = t.clientY - lastTouch.clientY;
                camera.rotation.y -= dx * 0.005;
                camera.rotation.x -= dy * 0.005;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                lastTouch = t;
            }
        });
        window.addEventListener('touchend', () => lastTouch = null);

        // ボタンイベント
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
        document.getElementById('ads-btn').addEventListener('touchstart', (e) => { e.preventDefault(); setAds(!isAds); });
        document.getElementById('reload-btn').addEventListener('touchstart', (e) => { e.preventDefault(); reload(); });
        document.getElementById('switch-btn').addEventListener('touchstart', (e) => { e.preventDefault(); switchWeapon(); });

        // PC入力
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyR') reload();
            if(e.code === 'Digit1') { currentWpnKey = 'S12K'; switchWeapon(); }
            if(e.code === 'Digit2') { currentWpnKey = 'XM7'; switchWeapon(); }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousedown', (e) => {
            if (!document.pointerLockElement && window.innerWidth > 1024) document.body.requestPointerLock();
            if (e.button === 0) fire();
            if (e.button === 2) setAds(true);
        });
        window.addEventListener('mouseup', (e) => { if (e.button === 2) setAds(false); });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                const sens = isAds ? 0.001 : 0.002;
                camera.rotation.y -= e.movementX * sens;
                camera.rotation.x -= e.movementY * sens;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 移動ロジック (PC & Mobile)
            const moveSpeed = 0.12;
            if (keys['KeyW']) camera.translateZ(-moveSpeed);
            if (keys['KeyS']) camera.translateZ(moveSpeed);
            if (keys['KeyA']) camera.translateX(-moveSpeed);
            if (keys['KeyD']) camera.translateX(moveSpeed);
            
            // モバイルジョイスティック移動
            camera.position.x += (Math.cos(camera.rotation.y) * moveData.x - Math.sin(camera.rotation.y) * moveData.y) * moveSpeed;
            camera.position.z += (-Math.sin(camera.rotation.y) * moveData.x - Math.cos(camera.rotation.y) * moveData.y) * moveSpeed;
            camera.position.y = 1.6;

            // 武器位置の同期と反動からの復帰
            weaponGroup.position.lerp(new THREE.Vector3(0,0,0), 0.1);
            weaponGroup.quaternion.copy(camera.quaternion);
            weaponGroup.position.add(camera.position);

            // 敵の挙動
            const now = Date.now();
            enemies.forEach(enemy => {
                const vector = new THREE.Vector3().subVectors(camera.position, enemy.position);
                vector.y = 0;
                const dist = vector.length();
                if (dist > 1.8) {
                    enemy.translateOnAxis(vector.normalize(), 0.04 + (wave * 0.005));
                } else if (playerHealth > 0) {
                    if (now - enemy.userData.lastAttack > 1000) {
                        playerHealth -= 10;
                        enemy.userData.lastAttack = now;
                        updateUI();
                        if (playerHealth <= 0) alert("GAME OVER! SCORE: " + score);
                    }
                }
                enemy.lookAt(camera.position.x, 1, camera.position.z);
            });

            if (enemies.length === 0) { wave++; spawnWave(); }
            renderer.render(scene, camera);
        }

        spawnWave();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
