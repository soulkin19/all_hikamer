<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Tactical PvE - Refined</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; background: #87ceeb; }
        #ui { position: absolute; top: 15px; left: 15px; color: #111; pointer-events: none; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); border: 1px solid black; }
        #crosshair::before { width: 100%; height: 2px; top: 6px; } #crosshair::after { width: 2px; height: 100%; left: 6px; }
        #ammo-display { position: absolute; bottom: 40px; right: 20px; color: white; text-align: right; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #ffeb3b; font-size: 20px; font-weight: bold; display: none; text-shadow: 2px 2px #000; }
        #wave-notify { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); color: #f44336; font-size: 50px; font-weight: bold; display: none; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span> | HP: <span id="health">100</span></div>
    <div id="crosshair"></div>
    <div id="reload-msg">SWAPPING MAG...</div>
    <div id="wave-notify">WAVE START</div>
    <div id="ammo-display">
        <div id="weapon-name" style="color: #ffeb3b; font-size: 1.2em;">XM7</div>
        <div style="font-size: 32px;"><span id="current-ammo">45</span> / <span id="max-ammo">45</span></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        const WEAPONS = {
            S12K: { name: 'S12K', maxAmmo: 4, rpm: 180, reloadTime: 1800, recoil: 0.12, recoveryDelay: 100, damage: 30, spread: 0.12, pellets: 8, color: 0x222222 },
            XM7: { name: 'XM7', maxAmmo: 45, rpm: 800, reloadTime: 2200, recoil: 0.035, recoveryDelay: 80, damage: 35, spread: 0.02, pellets: 1, color: 0x968169 }
        };

        let currentWeapon = WEAPONS.XM7;
        let ammo = currentWeapon.maxAmmo;
        let isReloading = false;
        let isAds = false;
        let score = 0, wave = 1, playerHealth = 100;
        let lastFireTime = 0;
        let targetRecoilX = 0; // 反動による目標角度

        // --- シーン・カメラ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 照明
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // 地面
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshPhongMaterial({ color: 0x77aa77 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(200, 40, 0x444444, 0x888888));

        // --- テクスチャ生成関数 ---
        function createGunTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, 64, 64);
            // 汚れ/ディテール追加
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            for(let i=0; i<20; i++) ctx.fillRect(Math.random()*64, Math.random()*64, 10, 2);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 武器モデル ---
        const weaponGroup = new THREE.Group();
        const weaponPivot = new THREE.Group(); // アニメーション用
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.12, 0.18, 0.7),
            new THREE.MeshPhongMaterial({ map: createGunTexture(WEAPONS.XM7.color) })
        );
        gunBody.position.set(0.3, -0.3, -0.5);
        weaponPivot.add(gunBody);
        weaponGroup.add(weaponPivot);
        scene.add(weaponGroup);

        // --- トレーサー (弾道) システム ---
        const tracers = [];
        function spawnTracer(startPos, targetVec) {
            const geometry = new THREE.BoxGeometry(0.02, 0.02, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
            const tracer = new THREE.Mesh(geometry, material);
            
            tracer.position.copy(startPos);
            tracer.lookAt(targetVec);
            scene.add(tracer);
            tracers.push({ mesh: tracer, speed: 2.5, life: 20 });
        }

        // --- 敵管理 ---
        const enemies = [];
        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5, 1, 4, 8),
                new THREE.MeshPhongMaterial({ color: 0xff3333 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * 10;
            enemy.position.set(Math.cos(angle)*dist, 1, Math.sin(angle)*dist);
            enemy.userData = { health: 100, lastAttack: 0 };
            scene.add(enemy);
            enemies.push(enemy);
        }

        // --- アクション ---
        function fire() {
            if (isReloading || ammo <= 0 || playerHealth <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;

            ammo--;
            lastFireTime = now;
            updateUI();

            // 反動: 跳ね上がり
            targetRecoilX += currentWeapon.recoil;
            weaponPivot.position.z += 0.15; // 銃本体のキックバック
            weaponPivot.rotation.x -= 0.1;

            const raycaster = new THREE.Raycaster();
            for (let i = 0; i < currentWeapon.pellets; i++) {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                raycaster.ray.direction.x += (Math.random() - 0.5) * currentWeapon.spread;
                raycaster.ray.direction.y += (Math.random() - 0.5) * currentWeapon.spread;

                // トレーサー生成
                const muzzlePos = new THREE.Vector3().setFromMatrixPosition(gunBody.matrixWorld);
                const targetPos = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(50));
                spawnTracer(muzzlePos, targetPos);

                const hits = raycaster.intersectObjects(enemies);
                if (hits.length > 0) {
                    const target = hits[0].object;
                    target.userData.health -= currentWeapon.damage;
                    if (target.userData.health <= 0) {
                        scene.remove(target);
                        enemies.splice(enemies.indexOf(target), 1);
                        score += 100;
                    }
                }
            }
            if (ammo === 0) reload();
        }

        function reload() {
            if (isReloading || ammo === currentWeapon.maxAmmo) return;
            isReloading = true;
            document.getElementById('reload-msg').style.display = 'block';

            // リロード演出: 銃を傾けて下げる
            const tl = { time: 0 };
            const reloadAnim = setInterval(() => {
                tl.time += 50;
                if(tl.time < 500) {
                    weaponPivot.position.y -= 0.05;
                    weaponPivot.rotation.z += 0.05;
                } else if(tl.time > currentWeapon.reloadTime - 500) {
                    weaponPivot.position.y += 0.05;
                    weaponPivot.rotation.z -= 0.05;
                }
                if(tl.time >= currentWeapon.reloadTime) {
                    ammo = currentWeapon.maxAmmo;
                    isReloading = false;
                    document.getElementById('reload-msg').style.display = 'none';
                    weaponPivot.position.set(0,0,0);
                    weaponPivot.rotation.set(0,0,0);
                    updateUI();
                    clearInterval(reloadAnim);
                }
            }, 50);
        }

        function updateUI() {
            document.getElementById('current-ammo').innerText = ammo;
            document.getElementById('max-ammo').innerText = currentWeapon.maxAmmo;
            document.getElementById('weapon-name').innerText = currentWeapon.name;
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            document.getElementById('health').innerText = Math.max(0, playerHealth);
            gunBody.material.map = createGunTexture(currentWeapon.color);
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // 反動リカバリー (撃ち終わってから一定時間で戻る)
            if (now - lastFireTime > currentWeapon.recoveryDelay) {
                targetRecoilX *= 0.85; // 徐々に0に戻す
            }
            camera.rotation.x += (targetRecoilX - 0); // 跳ね上がりを適用
            // マウス操作などでついた角度を少しずつ正規化（微調整）
            targetRecoilX *= 0.9;

            // 武器の追随とキックバック復帰
            weaponPivot.position.lerp(new THREE.Vector3(0,0,0), 0.15);
            weaponPivot.rotation.x *= 0.8;
            weaponGroup.quaternion.copy(camera.quaternion);
            weaponGroup.position.copy(camera.position);

            // トレーサーの移動
            for (let i = tracers.length - 1; i >= 0; i--) {
                const t = tracers[i];
                t.mesh.translateZ(t.speed);
                t.life--;
                if (t.life <= 0) {
                    scene.remove(t.mesh);
                    tracers.splice(i, 1);
                }
            }

            // 移動 (WASD)
            const speed = 0.12;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);
            camera.position.y = 1.6;

            // 敵AI
            enemies.forEach(enemy => {
                const vec = new THREE.Vector3().subVectors(camera.position, enemy.position);
                vec.y = 0;
                if (vec.length() > 1.8) {
                    enemy.translateOnAxis(vec.normalize(), 0.06);
                } else if (playerHealth > 0 && now - enemy.userData.lastAttack > 1000) {
                    playerHealth -= 10;
                    enemy.userData.lastAttack = now;
                    updateUI();
                }
                enemy.lookAt(camera.position.x, 1, camera.position.z);
            });

            if (enemies.length === 0) {
                wave++;
                for(let i=0; i<3+wave; i++) spawnEnemy();
                document.getElementById('wave-notify').style.display='block';
                setTimeout(()=>document.getElementById('wave-notify').style.display='none', 1000);
            }

            renderer.render(scene, camera);
        }

        // 入力
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') { e.preventDefault(); fire(); }
            if (e.code === 'Enter') { e.preventDefault(); isAds = !isAds; camera.fov = isAds ? 35 : 75; camera.updateProjectionMatrix(); gunBody.position.x = isAds ? 0 : 0.3; }
            if (e.code === 'KeyR') reload();
            if (e.code === 'Digit1') { currentWeapon = WEAPONS.S12K; ammo = currentWeapon.maxAmmo; updateUI(); }
            if (e.code === 'Digit2') { currentWeapon = WEAPONS.XM7; ammo = currentWeapon.maxAmmo; updateUI(); }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            }
        });
        window.addEventListener('mousedown', () => { if(window.innerWidth > 1024) document.body.requestPointerLock(); });

        for(let i=0; i<3; i++) spawnEnemy();
        updateUI();
        animate();
    </script>
</body>
</html>
