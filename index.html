<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS - XM7 & AWM</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.8); padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="ui">
    Weapon: <span id="weapon-name">XM7</span><br>
    Ammo: <span id="ammo">30 / ∞</span>
</div>
<div id="instructions">
    <h1>CLICK TO PLAY</h1>
    WASD: 移動 | 1, 2: 武器切替 | ENTER: ADS(スコープ) | SPACE: 射撃
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

// --- 設定 ---
const STAGE_SIZE = 100;
const WEAPONS = {
    xm7: { name: 'XM7', zoom: 1.25, recoil: 0.05, speed: 100, ammo: 30, color: 0x555555, size: [0.1, 0.1, 0.5] },
    awm: { name: 'AWM', zoom: 4.0, recoil: 0.2, speed: 800, ammo: 5, color: 0x224422, size: [0.1, 0.1, 0.8] }
};

let currentWeapon = WEAPONS.xm7;
let isAds = false;
let isReloading = false;

// --- シーン構築 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // 青空

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// 地面
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(STAGE_SIZE, STAGE_SIZE),
    new THREE.MeshStandardMaterial({ color: 0x448844 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- プレイヤー & 武器 ---
const controls = new PointerLockControls(camera, document.body);
const instructions = document.getElementById('instructions');

instructions.addEventListener('click', () => controls.lock());
controls.addEventListener('lock', () => instructions.style.display = 'none');
controls.addEventListener('unlock', () => instructions.style.display = 'block');

const weaponGroup = new THREE.Group();
camera.add(weaponGroup);
scene.add(camera);

let weaponMesh;
function createWeaponMesh(config) {
    if (weaponMesh) weaponGroup.remove(weaponMesh);
    const geo = new THREE.BoxGeometry(...config.size);
    const mat = new THREE.MeshStandardMaterial({ color: config.color });
    weaponMesh = new THREE.Mesh(geo, mat);
    weaponMesh.position.set(0.3, -0.2, -0.5);
    weaponGroup.add(weaponMesh);
}
createWeaponMesh(currentWeapon);

// --- 敵 (BOT) ---
const enemies = [];
function spawnBot() {
    const geo = new THREE.BoxGeometry(1, 2, 1);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const bot = new THREE.Mesh(geo, mat);
    bot.position.set(Math.random() * 40 - 20, 1, Math.random() * 40 - 20);
    bot.userData = { health: 100 };
    scene.add(bot);
    enemies.push(bot);
}
for(let i=0; i<5; i++) spawnBot();

// --- 入力制御 ---
const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.key === '1') switchWeapon(WEAPONS.xm7);
    if (e.key === '2') switchWeapon(WEAPONS.awm);
    if (e.code === 'Enter') toggleAds();
    if (e.code === 'Space') fire();
});
document.addEventListener('keyup', (e) => keys[e.code] = false);

function switchWeapon(w) {
    currentWeapon = w;
    createWeaponMesh(w);
    isAds = false;
    camera.fov = 75;
    camera.updateProjectionMatrix();
    document.getElementById('weapon-name').innerText = w.name;
}

function toggleAds() {
    isAds = !isAds;
    camera.fov = isAds ? 75 / currentWeapon.zoom : 75;
    camera.updateProjectionMatrix();
    weaponMesh.position.x = isAds ? 0 : 0.3; // センターに寄せる
}

function fire() {
    if (isReloading) return;
    
    // 反動 (Recoil)
    camera.rotation.x += currentWeapon.recoil;
    
    // 弾道計算 (Raycaster)
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const hits = raycaster.intersectObjects(enemies);
    
    if (hits.length > 0) {
        const target = hits[0].object;
        scene.remove(target); // 敵を倒す
        enemies.splice(enemies.indexOf(target), 1);
        setTimeout(spawnBot, 2000); // 2秒後にリスポーン
    }

    // 発射演出（簡易リロード）
    isReloading = true;
    setTimeout(() => isReloading = false, currentWeapon.speed);
}

// --- メインループ ---
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked) {
        // 移動処理
        const delta = 0.15;
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(keys['KeyW']) - Number(keys['KeyS']);
        direction.x = Number(keys['KeyD']) - Number(keys['KeyA']);
        direction.normalize();

        if (keys['KeyW'] || keys['KeyS']) velocity.z -= direction.z * 400.0 * delta;
        if (keys['KeyA'] || keys['KeyD']) velocity.x -= direction.x * 400.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        // BOTの簡易AI (プレイヤーを追う)
        enemies.forEach(bot => {
            const dir = new THREE.Vector3().subVectors(camera.position, bot.position).normalize();
            bot.position.x += dir.x * 0.05;
            bot.position.z += dir.z * 0.05;
            bot.lookAt(camera.position.x, 1, camera.position.z);
        });
    }

    renderer.render(scene, camera);
}
animate();

// 画面リサイズ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
